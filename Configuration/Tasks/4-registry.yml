title: Registry Tweaks
actions:
  - !status: {status: 'Applying MMCSS gaming priority'}

  # MMCSS reserves this % of CPU for low-priority background work. Microsoft's
  # docs clamp any value below 10 back up to 20, so the common '0' tweak actually
  # yields 20% reserved - the opposite of the goal. 10 is the true minimum and the
  # best setting for foreground gaming.
  - !registryValue:
      path: 'HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Multimedia\SystemProfile'
      value: 'SystemResponsiveness'
      type: REG_DWORD
      data: '10'

  - !registryValue:
      path: 'HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Multimedia\SystemProfile\Tasks\Games'
      value: 'GPU Priority'
      type: REG_DWORD
      data: '8'

  - !registryValue:
      path: 'HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Multimedia\SystemProfile\Tasks\Games'
      value: 'Priority'
      type: REG_DWORD
      data: '6'

  - !registryValue:
      path: 'HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Multimedia\SystemProfile\Tasks\Games'
      value: 'Scheduling Category'
      type: REG_SZ
      data: 'High'

  - !registryValue:
      path: 'HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Multimedia\SystemProfile\Tasks\Games'
      value: 'SFIO Priority'
      type: REG_SZ
      data: 'High'

  - !status: {status: 'Configuring CPU scheduler'}

  - !registryValue:
      path: 'HKLM\SYSTEM\CurrentControlSet\Control\PriorityControl'
      value: 'Win32PrioritySeparation'
      type: REG_DWORD
      data: '38'

  - !status: {status: 'Optimizing memory management'}

  # Only disable paging of kernel executive code on systems with 8 GB+ RAM.
  # On low-RAM systems this can exhaust non-paged pool and cause BSODs.
  - !cmd:
      command: 'powershell -NoProfile -Command "$ram=(Get-CimInstance Win32_ComputerSystem).TotalPhysicalMemory;if($ram -ge 8GB){Set-ItemProperty -Path ''HKLM:\SYSTEM\CurrentControlSet\Control\Session Manager\Memory Management'' -Name DisablePagingExecutive -Value 1 -Type DWord;Write-Host ''DisablePagingExecutive enabled (sufficient RAM detected)''}else{Write-Host ''Skipping DisablePagingExecutive: less than 8 GB RAM - not safe to enable''}"'
      wait: true

  - !registryValue:
      path: 'HKLM\SYSTEM\CurrentControlSet\Control\Session Manager\Memory Management'
      value: 'LargeSystemCache'
      type: REG_DWORD
      data: '0'

  - !status: {status: 'Enabling hardware accelerated GPU scheduling'}

  - !registryValue:
      path: 'HKLM\SYSTEM\CurrentControlSet\Control\GraphicsDrivers'
      value: 'HwSchMode'
      type: REG_DWORD
      data: '2'

  - !status: {status: 'Disabling mouse acceleration'}

  - !registryValue:
      path: 'HKCU\Control Panel\Mouse'
      value: 'MouseSpeed'
      type: REG_SZ
      data: '0'

  - !registryValue:
      path: 'HKCU\Control Panel\Mouse'
      value: 'MouseThreshold1'
      type: REG_SZ
      data: '0'

  - !registryValue:
      path: 'HKCU\Control Panel\Mouse'
      value: 'MouseThreshold2'
      type: REG_SZ
      data: '0'

  - !status: {status: 'Applying NTFS and shutdown optimizations'}

  # fsutil (not a raw registry write) so NTFS is told immediately. We ask for
  # user-managed disabled (1), but Windows owns the system-managed bit
  # (0x80000000) and stamps large-volume SSDs 0x80000001 (system-managed,
  # last-access disabled) regardless. Either way last-access is off, which is
  # the goal; the verifier compares only the low (disable) bit for this value.
  - !cmd:
      command: 'fsutil behavior set disablelastaccess 1'
      wait: true

  - !registryValue:
      path: 'HKLM\SYSTEM\CurrentControlSet\Control'
      value: 'WaitToKillServiceTimeout'
      type: REG_SZ
      data: '1500'

  - !registryValue:
      path: 'HKCU\Control Panel\Desktop'
      value: 'HungAppTimeout'
      type: REG_SZ
      data: '2000'

  - !registryValue:
      path: 'HKCU\Control Panel\Desktop'
      value: 'WaitToKillAppTimeout'
      type: REG_SZ
      data: '2000'

  - !registryValue:
      path: 'HKCU\Control Panel\Desktop'
      value: 'AutoEndTasks'
      type: REG_SZ
      data: '1'

  - !status: {status: 'Applying network latency optimizations'}

  # NetworkThrottlingIndex is an MMCSS value: it lives under Multimedia\SystemProfile
  # (next to SystemResponsiveness), NOT under Tcpip\Parameters where MMCSS never
  # reads it. 0xFFFFFFFF disables the default ~10 packets/ms multimedia throttle.
  - !registryValue:
      path: 'HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Multimedia\SystemProfile'
      value: 'NetworkThrottlingIndex'
      type: REG_DWORD
      data: '4294967295'

  - !registryValue:
      path: 'HKLM\SYSTEM\CurrentControlSet\Services\Tcpip\Parameters'
      value: 'TcpNoDelay'
      type: REG_DWORD
      data: '1'

  - !registryValue:
      path: 'HKLM\SOFTWARE\Microsoft\MSMQ\Parameters'
      value: 'TCPNoDelay'
      type: REG_DWORD
      data: '1'

  - !registryValue:
      path: 'HKLM\SYSTEM\CurrentControlSet\Services\AFD\Parameters'
      value: 'DefaultSendWindow'
      type: REG_DWORD
      data: '65536'

  - !registryValue:
      path: 'HKLM\SYSTEM\CurrentControlSet\Services\AFD\Parameters'
      value: 'DefaultReceiveWindow'
      type: REG_DWORD
      data: '65536'

  - !status: {status: 'Disabling visual effects and animations'}

  - !registryValue:
      path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\Explorer\VisualEffects'
      value: 'VisualFXSetting'
      type: REG_DWORD
      data: '2'

  - !registryValue:
      path: 'HKCU\Control Panel\Desktop'
      value: 'MenuShowDelay'
      type: REG_SZ
      data: '0'

  - !registryValue:
      path: 'HKCU\Control Panel\Desktop\WindowMetrics'
      value: 'MinAnimate'
      type: REG_SZ
      data: '0'

  - !registryValue:
      path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\DriverSearching'
      value: 'SearchOrderConfig'
      type: REG_DWORD
      data: '0'

  - !registryValue:
      path: 'HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Schedule\Maintenance'
      value: 'MaintenanceDisabled'
      type: REG_DWORD
      data: '1'

  - !status: {status: 'Disabling Game Bar / DVR'}

  - !registryValue:
      path: 'HKCU\System\GameConfigStore'
      value: 'GameDVR_Enabled'
      type: REG_DWORD
      data: '0'
      option: 'disable-gamebar'

  - !registryValue:
      path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\GameDVR'
      value: 'AllowGameDVR'
      type: REG_DWORD
      data: '0'
      option: 'disable-gamebar'

  - !registryValue:
      path: 'HKCU\SOFTWARE\Microsoft\Windows\CurrentVersion\GameDVR'
      value: 'AppCaptureEnabled'
      type: REG_DWORD
      data: '0'
      option: 'disable-gamebar'

  - !registryValue:
      path: 'HKCU\SOFTWARE\Microsoft\GameBar'
      value: 'UseNexusForGameBarEnabled'
      type: REG_DWORD
      data: '0'
      option: 'disable-gamebar'

  - !registryValue:
      path: 'HKCU\SOFTWARE\Microsoft\GameBar'
      value: 'AllowAutoGameMode'
      type: REG_DWORD
      data: '0'
      option: 'disable-gamebar'

  - !registryValue:
      path: 'HKCU\SOFTWARE\Microsoft\GameBar'
      value: 'AutoGameModeEnabled'
      type: REG_DWORD
      data: '0'
      option: 'disable-gamebar'
