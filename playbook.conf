<?xml version="1.0" encoding="utf-8"?>
<Playbook>
    <Name>Chamber</Name>
    <Username>Chamber</Username>
    <UniqueId>d3f8a1b2-7c4e-4f9d-b6a5-2e1c8d0f3a7b</UniqueId>
    <ShortDescription>Maximum performance gaming setup for competitive esports PCs</ShortDescription>
    <Title>Chamber Gaming Setup</Title>
    <Description>A professional gaming PC configuration toolkit. Applies performance optimizations, removes bloatware, configures privacy settings, and prepares systems for competitive esports titles including Fortnite, Valorant, CS2, and Call of Duty.</Description>
    <Details>Chamber v1.2 - Professional gaming PC setup by Chamber Builds</Details>
    <Version>1.2.0</Version>
    <SupportedBuilds>
        <string>22621</string>
        <string>22631</string>
        <string>26100</string>
        <string>26200</string>
    </SupportedBuilds>
    <Requirements>
        <Requirement>NoPendingUpdates</Requirement>
        <Requirement>NoAntivirus</Requirement>
    </Requirements>
    <FeaturePages>
        <!-- PAGE 1: Security Options (no TopLine — 4 allowed) -->
        <CheckboxPage Description="Security configuration - select options carefully. Read each description before enabling.">
            <Options>
                <CheckboxOption IsChecked="false">
                    <Text>Disable Windows Defender</Text>
                    <Name>remove-defender</Name>
                    <Description>Removes Windows Defender antivirus. Recommended for dedicated gaming rigs with no web browsing. Install a third-party AV if needed.</Description>
                </CheckboxOption>
                <CheckboxOption IsChecked="false">
                    <Text>Disable VBS / HVCI (Not Recommended — breaks apps that need virtualization)</Text>
                    <Name>disable-vbs</Name>
                    <Description>Disables VBS and HVCI. Recovers 5-10% FPS in CPU-bound games. Do NOT enable if you use WSL2, Windows Sandbox, Docker Desktop, or other apps that require hardware-backed virtualization.</Description>
                </CheckboxOption>
                <CheckboxOption IsChecked="false">
                    <Text>Pause automatic Windows Updates (Not Recommended)</Text>
                    <Name>disable-updates</Name>
                    <Description>Notify-only mode: no background downloads or installs. You still run updates manually from Settings. Microsoft Store and Xbox downloads keep working.</Description>
                </CheckboxOption>
                <CheckboxOption IsChecked="true">
                    <Text>Disable Smart App Control</Text>
                    <Name>disable-sac</Name>
                    <Description>Disables Smart App Control which can block game installers and modding tools.</Description>
                </CheckboxOption>
            </Options>
        </CheckboxPage>

        <!-- PAGE 2: Gaming Services (TopLine — 3 max) -->
        <CheckboxPage Description="Configure Xbox and gaming services.">
            <TopLine Text="Gaming Services"/>
            <Options>
                <CheckboxOption IsChecked="false">
                    <Text>Remove Xbox Services</Text>
                    <Name>remove-xbox</Name>
                    <Description>Removes Xbox Game Bar, Xbox Identity Provider, and Xbox services. Do NOT enable if you use Game Pass.</Description>
                </CheckboxOption>
                <CheckboxOption IsChecked="true">
                    <Text>Disable Game Bar / DVR Recording (Not Recommended on Dual CCD CPUs)</Text>
                    <Name>disable-gamebar</Name>
                    <Description>Disables Game Bar overlay, background recording, and Auto Game Mode. Reduces input lag and GPU overhead. Do NOT enable on AMD dual-CCD CPUs (e.g. Ryzen 9 5900X, 7900X, 7950X3D) — Auto Game Mode helps Windows keep game threads on the faster CCD, which outweighs the overhead on those chips.</Description>
                </CheckboxOption>
            </Options>
        </CheckboxPage>

        <!-- PAGE 3: Display Protection (1) -->
        <CheckboxPage Description="Display protection and burn-in reduction options.">
            <TopLine Text="Display"/>
            <Options>
                <CheckboxOption IsChecked="false">
                    <Text>OLED Safety</Text>
                    <Name>oled-safety</Name>
                    <Description>Turns the display off after 5 minutes on AC and battery, and enables taskbar auto-hide to reduce static UI retention.</Description>
                </CheckboxOption>
            </Options>
        </CheckboxPage>

        <!-- PAGE 4: Browser Choice (3 max) -->
        <RadioPage Description="Browser selection - choose a browser to install.">
            <Options>
                <RadioOption IsChecked="true">
                    <Text>Chrome</Text>
                    <Name>browser-chrome</Name>
                </RadioOption>
                <RadioOption IsChecked="false">
                    <Text>Brave (Privacy-focused, ad-blocking built-in)</Text>
                    <Name>browser-brave</Name>
                </RadioOption>
                <RadioOption IsChecked="false">
                    <Text>Skip - I already have a browser</Text>
                    <Name>browser-skip</Name>
                </RadioOption>
            </Options>
        </RadioPage>

    </FeaturePages>
</Playbook>
